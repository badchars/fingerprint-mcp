<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Icon glow (softer for light mode) -->
    <filter id="icon-glow-light">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill backgrounds -->
    <linearGradient id="lpill-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <linearGradient id="lpill-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="lpill-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="lpill-violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="lpill-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg-light)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="799" height="319" rx="0" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="#0891b2" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Subtle glow orbs -->
  <circle cx="200" cy="140" r="120" fill="#0891b2" opacity="0.025"/>
  <circle cx="200" cy="140" r="70" fill="#0891b2" opacity="0.03"/>
  <circle cx="620" cy="160" r="100" fill="#6366f1" opacity="0.025"/>
  <circle cx="620" cy="160" r="55" fill="#6366f1" opacity="0.03"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent-light)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="318" width="800" height="2" fill="url(#accent-light)"/>

  <!-- Shield with fingerprint icon -->
  <g transform="translate(400, 80)" filter="url(#icon-glow-light)">
    <!-- Shield shape -->
    <path d="M0,-38 L-28,-24 L-28,4 C-28,22 -10,36 0,42 C10,36 28,22 28,4 L28,-24 Z"
          fill="none" stroke="url(#accent-light)" stroke-width="2.5" opacity="0.8"/>
    <!-- Fingerprint: concentric arcs -->
    <path d="M0,-20 Q-12,-20 -12,-8" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-16 Q-8,-16 -8,-6 Q-8,4 0,4" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <path d="M0,-12 Q-4,-12 -4,-4 Q-4,6 4,8" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,-8 Q4,-8 4,0 Q4,10 -2,14" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <path d="M0,-4 Q8,-4 8,4 Q8,16 0,20" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="152" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="28" font-weight="700" fill="#1e293b" letter-spacing="-0.5">fingerprint-mcp</text>

  <!-- Subtitle -->
  <text x="400" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">Universal Digital Fingerprinting for AI Agents</text>

  <!-- Accent line -->
  <rect x="320" y="189" width="160" height="2" rx="1" fill="url(#accent-light)" opacity="0.5"/>

  <!-- Stats pills row -->
  <g transform="translate(400, 216)">
    <!-- 13 Tools (cyan) -->
    <g transform="translate(-225, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="url(#lpill-cyan)" stroke="#67e8f9" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0891b2">13 Tools</text>
    </g>
    <!-- 103 Techniques (blue) -->
    <g transform="translate(-112, 0)">
      <rect x="-52" y="-12" width="104" height="24" rx="12" fill="url(#lpill-blue)" stroke="#93c5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#2563eb">103 Techniques</text>
    </g>
    <!-- MCP (indigo) -->
    <g transform="translate(10, 0)">
      <rect x="-28" y="-12" width="56" height="24" rx="12" fill="url(#lpill-indigo)" stroke="#a5b4fc" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#6366f1">MCP</text>
    </g>
    <!-- CLI (violet) -->
    <g transform="translate(90, 0)">
      <rect x="-24" y="-12" width="48" height="24" rx="12" fill="url(#lpill-violet)" stroke="#c4b5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">CLI</text>
    </g>
    <!-- Zero Config (green) -->
    <g transform="translate(190, 0)">
      <rect x="-40" y="-12" width="80" height="24" rx="12" fill="url(#lpill-green)" stroke="#86efac" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#16a34a">Zero Config</text>
    </g>
  </g>

  <!-- Source names -->
  <text x="400" y="260" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="9.5" fill="#94a3b8" letter-spacing="0.8">TCP · TLS · SSH · HTTP · DNS · WAF · OSINT · Shodan · Censys</text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="20" r="1.5" fill="#0891b2" opacity="0.2"/>
  <circle cx="780" cy="20" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="20" cy="300" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="780" cy="300" r="1.5" fill="#0891b2" opacity="0.2"/>
</svg>